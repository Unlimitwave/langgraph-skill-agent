name: Build and push image

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (default branch HEAD)
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and push
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve source ref
        id: source
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="${{ inputs.ref }}"
            if [ -z "$ref" ]; then
              ref="${{ github.ref }}"
            fi
            echo "ref=$ref" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Record commit SHA
        id: sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image name (lowercase)
        id: image
        run: |
          name="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "IMAGE=$name" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.sha.outputs.value }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.sha.outputs.value }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.name }}:${{ steps.sha.outputs.value }}"
          docker push "${{ steps.image.outputs.name }}:latest"

      - name: Publish build summary
        run: |
          {
            echo "### Image published"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Registry | \`${{ steps.image.outputs.name }}\` |"
            echo "| Tag (immutable) | \`${{ steps.sha.outputs.value }}\` |"
            echo "| Deploy | Actions → Deploy → tag = \`${{ steps.sha.outputs.value }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
